<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语水族馆 - Ocean English</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/aquarium.css">
    <link rel="stylesheet" href="/css/panels.css">
    <link rel="stylesheet" href="/css/tasks.css">
    <link rel="stylesheet" href="/css/blindbox.css">
</head>
<body>
    <!-- 水族馆全屏背景 -->
    <canvas id="aquarium-canvas"></canvas>

    <!-- 登录模态框 -->
    <div id="login-overlay" class="login-overlay hidden">
        <div class="login-backdrop"></div>
        <div class="login-modal">
            <div class="login-header">
                <div class="login-logo">&#x1f30a;</div>
                <h2>英语水族馆</h2>
                <p>Ocean English</p>
            </div>
            <div class="login-body">
                <div class="login-input-group">
                    <label>手机号</label>
                    <input type="tel" id="login-phone" placeholder="请输入11位手机号" maxlength="11" inputmode="numeric">
                </div>
                <div class="login-input-group">
                    <label>验证码</label>
                    <div class="code-row">
                        <input type="text" id="login-code" placeholder="6位验证码" maxlength="6" inputmode="numeric">
                        <button id="send-code-btn" class="btn-send-code" onclick="Auth.sendCode()">获取验证码</button>
                    </div>
                </div>
                <button class="btn-login" id="btn-login" onclick="Auth.login()">登录</button>
                <p class="login-hint">首次登录将自动注册账号</p>
            </div>
        </div>
    </div>

    <!-- 时间问候语 -->
    <div id="time-greeting">
        <div class="greeting-wave">&#x1f30a;</div>
        <div class="greeting-text" id="greeting-text">Good Morning!</div>
        <div class="greeting-sub" id="greeting-sub">晨间学习</div>
        <div class="greeting-time" id="greeting-time"></div>
    </div>

    <!-- 左上角用户浮标 -->
    <div id="user-float" onclick="App.toggleProfilePopup()">
        <div class="avatar" id="user-avatar">&#x1f420;</div>
        <div class="user-name-area">
            <span id="user-name">探险家</span>
            <span class="user-level" id="user-level-tag">探险新手</span>
        </div>
    </div>

    <!-- 右上角资源浮标 -->
    <div id="resources-float">
        <div class="currency" title="贝壳">
            <span class="currency-icon">&#x1f41a;</span>
            <span id="shell-count">100</span>
        </div>
        <div class="currency" title="珍珠">
            <span class="currency-icon">&#x1f4ce;</span>
            <span id="pearl-count">3</span>
        </div>
        <div class="currency aquarium-chip" id="aquarium-stats-bar" title="海洋图鉴" onclick="App.showCollection()">
            <span class="currency-icon">&#x1f420;</span>
            <span id="collected-count">0</span>/15
        </div>
        <div class="streak-badge" id="streak-badge" title="连续签到" onclick="App.quickCheckin()">
            &#x1f525; <span id="streak-count">0</span>天
            <span class="streak-reward-hint" id="streak-reward-hint"></span>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div id="profile-popup" class="profile-popup hidden">
        <div class="profile-popup-header">
            <div class="profile-avatar" id="profile-avatar">&#x1f420;</div>
            <div class="profile-name" id="profile-name">探险家</div>
            <div class="profile-level" id="profile-level">
                <span class="level-emoji" id="level-emoji">&#x1f420;</span>
                <span class="level-title" id="level-title">探险新手</span>
            </div>
            <div class="profile-level-en" id="level-title-en">Explorer Newbie</div>
        </div>
        <div class="profile-stats">
            <div class="profile-stat">
                <div class="pstat-value" id="pstat-tasks">0</div>
                <div class="pstat-label">完成任务</div>
            </div>
            <div class="profile-stat">
                <div class="pstat-value">&#x1f41a; <span id="pstat-shells">0</span></div>
                <div class="pstat-label">贝壳</div>
            </div>
            <div class="profile-stat">
                <div class="pstat-value">&#x1f4ce; <span id="pstat-pearls">0</span></div>
                <div class="pstat-label">珍珠</div>
            </div>
            <div class="profile-stat">
                <div class="pstat-value">&#x1f525; <span id="pstat-streak">0</span>天</div>
                <div class="pstat-label">连续签到</div>
            </div>
            <div class="profile-stat">
                <div class="pstat-value">&#x1f420; <span id="pstat-creatures">0</span></div>
                <div class="pstat-label">海洋生物</div>
            </div>
            <div class="profile-stat">
                <div class="pstat-value" id="pstat-phone">-</div>
                <div class="pstat-label">手机号</div>
            </div>
        </div>
        <button class="btn-logout" onclick="Auth.logout()">退出登录</button>
    </div>

    <!-- 右侧操作区 -->
    <div id="right-actions">
        <!-- 练习子菜单 -->
        <div id="practice-submenu" class="practice-submenu hidden">
            <button class="submenu-item vocab-item" data-category="vocabulary">
                <span class="submenu-icon">&#x1f4dd;</span>
                <span class="submenu-label">单词</span>
                <span class="submenu-desc">Vocab</span>
            </button>
            <button class="submenu-item listen-item" data-category="listening">
                <span class="submenu-icon">&#x1f3a7;</span>
                <span class="submenu-label">听力</span>
                <span class="submenu-desc">Listen</span>
            </button>
            <button class="submenu-item speak-item" data-category="speaking">
                <span class="submenu-icon">&#x1f5e3;</span>
                <span class="submenu-label">口语</span>
                <span class="submenu-desc">Speak</span>
            </button>
        </div>

        <!-- 主按钮 -->
        <div id="main-buttons">
            <button id="practice-btn" class="action-fab practice-fab" onclick="App.togglePracticeMenu()">
                <span class="fab-bg"></span>
                <span class="fab-icon-main">&#x1f4da;</span>
            </button>
            <button id="blindbox-btn" class="action-fab blindbox-action" onclick="App.openPanel('blindbox')">
                <span class="fab-bg"></span>
                <span class="fab-icon-main">&#x1f381;</span>
            </button>
            <button id="checkin-btn" class="action-fab checkin-action" onclick="App.quickCheckin()">
                <span class="fab-bg"></span>
                <span class="fab-icon-main">&#x2600;</span>
            </button>
        </div>
    </div>

    <!-- 右侧滑出面板 -->
    <div id="slide-panel" class="slide-panel hidden">
        <div class="panel-backdrop" onclick="App.closePanel()"></div>
        <div class="panel-content" id="panel-content">
            <button class="panel-close" onclick="App.closePanel()">&#x2715;</button>
            <div class="panel-body" id="panel-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/sprites.js"></script>
    <script src="/js/swim-ai.js"></script>
    <script src="/js/particles.js"></script>
    <script src="/js/lighting.js"></script>
    <script src="/js/environment.js"></script>
    <script src="/js/interaction.js"></script>
    <script src="/js/aquarium.js"></script>
    <script src="/js/tasks.js"></script>
    <script src="/js/blindbox.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
